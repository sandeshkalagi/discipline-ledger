<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Discipline Ledger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container auth-page">
    <section class="panel auth-card">
        <h1>Discipline Ledger</h1>
        <p class="muted">Login to continue your trading journal.</p>
        <form id="login-form" class="form-grid auth-form">
            <div class="full-width">
                <label for="login-email">Email</label>
                <input id="login-email" type="email" required>
            </div>
            <div class="full-width">
                <label for="login-password">Password</label>
                <input id="login-password" type="password" required>
            </div>
            <div class="full-width">
                <button class="btn" type="submit">Login</button>
            </div>
        </form>
        <p id="login-message" class="msg"></p>
        <p class="muted">New user? <a href="register.html">Create account</a></p>
    </section>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
